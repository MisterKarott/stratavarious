name: CI

on: [push, pull_request]

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plugin.json
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          echo "plugin.json is valid JSON"

      - name: Validate package.json
        run: |
          python3 -c "import json; json.load(open('package.json'))"
          echo "package.json is valid JSON"

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

      - name: Bash 3.2 compatibility check
        run: |
          # Verify scripts don't use Bash 4+ features (associative arrays, mapfile, etc.)
          for f in scripts/*.sh; do
            if grep -qE '(declare -A|mapfile|readarray|\$\{[a-zA-Z_]+,,\}|\[\[.*=\~)' "$f"; then
              echo "FAIL: $f uses Bash 4+ features"
              grep -nE '(declare -A|mapfile|readarray|\$\{[a-zA-Z_]+,,\}|\[\[.*=\~)' "$f"
              exit 1
            fi
          done
          echo "All scripts are Bash 3.2 compatible"

      - name: Node syntax check
        run: |
          node --check hooks/stratavarious-stop.js
          echo "Hook syntax OK"

      - name: Unit tests
        run: npm test

      - name: Hook dry test
        run: |
          mkdir -p /tmp/strata-test/memory
          echo '{}' | STRATAVARIOUS_HOME=/tmp/strata-test node hooks/stratavarious-stop.js
          echo "Hook executed without crash"

  e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run E2E tests
        run: bash tests/integration/test-e2e.sh
        timeout-minutes: 5
